
# General project configuration
general:
  seed: 22

# All paths used in the project
paths:
  base_data: "data" # Relative to project root
  models_dir: "models" # Directory to save/load models
  submissions_dir: "submissions" # Directory to save submission files
  
  # Input data
  train_csv: "${paths.base_data}/train.csv"
  test_csv: "${paths.base_data}/test.csv"
  sample_submission: "${paths.base_data}/sample_submission.csv"

  # Model & output paths
  # Base models now point to local directories after manual download
  qwen_base_model: "${paths.models_dir}/Qwen-4B-Chat"
  qwen_lora_output: "${paths.models_dir}/qwen_lora_pseudo"
  gte_base_model: "${paths.models_dir}/gte-base-en-v1.5"
  gte_finetuned: "${paths.models_dir}/gte_finetuned"

  # Submission files
  qwen_submission: "${paths.submissions_dir}/sub_qwen.csv"
  gte_submission: "${paths.submissions_dir}/sub_gte.csv"
  final_submission: "${paths.submissions_dir}/submission.csv"

# Configuration for the Qwen model (LLM)
qwen_model:
  prompt:
    positive_token: "Yes"
    negative_token: "No"
    judge_words: "Violation:"
    system_prompt: >
      You are given a comment from reddit and a rule.
      Your task is to classify whether the comment violates the rule.
      Only respond Yes/No.

  training:
    use_pseudo_train: True
    pseudo_frac: 0.05 # Fraction of test data to use for pseudo-labeling
    lora_config:
      r: 32
      lora_alpha: 64
      lora_dropout: 0.0
      bias: "none"
      target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
      task_type: "CAUSAL_LM"
    trainer:
      num_train_epochs: 1
      per_device_train_batch_size: 1
      gradient_accumulation_steps: 4 # Effective batch size will be 1 * 4 = 4
      optim: "paged_adamw_8bit"      # Use paged optimizer to save VRAM
      learning_rate: 2e-4
      weight_decay: 0.20
      max_grad_norm: 1.0
      lr_scheduler_type: "cosine"
      warmup_ratio: 0.03
      # bf16/fp16 will be handled by Accelerate
      save_strategy: "epoch"
      logging_strategy: "steps"
      logging_steps: 10
      report_to: "none" # Set to "wandb" to enable logging
      remove_unused_columns: true
    quantization:
      load_in_4bit: True
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_compute_dtype: "bfloat16" # Will be converted to torch.bfloat16 in code
      bnb_4bit_use_double_quant: True

  inference:
    max_new_tokens: 1 # We only need a "Yes" or "No"
    batch_size: 8

# Configuration for the GTE model (Embedding)
gte_model:
  training:
    augmentation_factor: 2
    subsample_fraction: 1.0
    epochs: 1
    train_batch_size: 32
    learning_rate: 2e-5
    triplet_margin: 0.25
    max_seq_length: 256

  inference:
    batch_size: 64
    similarity_threshold: 0.8 # Example threshold, needs tuning

# Configuration for Hugging Face Accelerate
accelerate:
  compute_environment: LOCAL_MACHINE
  distributed_type: 'NO'
  machine_rank: 0
  num_machines: 1
  num_processes: 1
  use_cpu: false
  mixed_precision: 'fp16' # Use 'bf16' for Ampere GPUs or newer
